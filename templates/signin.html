<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Sign In | AgriNutrientNet</title>

  <!-- ✅ FIXED CSS PATHS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>

<body class="auth-body">

<!-- ✅ NAVBAR -->
<header>
  <div class="container">
    <h1><a href="{{ url_for('base') }}">🌱AgriNutrientNet</a></h1>
    <nav>
      <ul>
        <li><a href="{{ url_for('home') }}">Home</a></li>
        <li><a href="{{ url_for('about') }}">About</a></li>
        <li><a href="{{ url_for('upload') }}">Detect</a></li>
        <li><a href="{{ url_for('contact') }}">Need Help?</a></li>
        <li><a href="{{ url_for('signup') }}">Join Now</a></li>
      </ul>
    </nav>
  </div>
</header>

<!-- ✅ SIGN IN CARD -->
<div class="auth-card">
  <h2>Get Started</h2>
  <p>Access your smart nutrient deficiency detector 🌱</p>

<form method="POST" action="{{ url_for('signin') }}">
    <input type="text" name="username" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Sign In</button>

    <p class="switch">
        Don’t have an account?
        <a href="{{ url_for('signup') }}">Sign Up</a>
    </p>
</form>
</div>

</body>
</html>
